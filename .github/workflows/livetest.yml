name: livetest

# Manually-triggered "drive a real Windows/macOS machine from your phone" session.
# Spins up a hosted runner, joins it to your tailnet, enables remote viewing (RDP on
# Windows, Screen Sharing/VNC on macOS), starts the Relay receiver, then holds the job
# open for a few minutes so your phone can connect over Tailscale and you can watch +
# type live from pop-os (Remmina).
#
# Needs repo secret TS_AUTHKEY (a reusable + ephemeral Tailscale auth key).
# Note: occasional interactive QA of your own build only — keep sessions short.

on:
  workflow_dispatch:
    inputs:
      os:
        description: Which OS to drive
        type: choice
        options: [macos, windows]
        default: macos
      minutes:
        description: How long to hold the session open
        default: '12'

jobs:
  live:
    runs-on: ${{ inputs.os == 'macos' && 'macos-latest' || 'windows-latest' }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build receiver
        working-directory: desktop
        run: cargo build --release

      # ---------------------------------- macOS ----------------------------------
      - name: macOS — tailnet + Screen Sharing + receiver
        if: ${{ inputs.os == 'macos' }}
        env:
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
          DRIVER_SSH_PUBKEY: ${{ secrets.DRIVER_SSH_PUBKEY }}
          MINUTES: ${{ inputs.minutes }}
        run: |
          set -e
          # install.sh just opens the App Store on macOS — use Homebrew for the real CLI + daemon,
          # and run tailscaled in TUN mode so the host gets a real 100.x interface (userspace mode
          # would not expose :5900 / :47600 to the tailnet).
          brew install tailscale
          TS=/opt/homebrew/bin/tailscale
          sudo /opt/homebrew/bin/tailscaled > /tmp/tailscaled.log 2>&1 &
          sleep 4
          sudo "$TS" up --authkey="$TS_AUTHKEY" --hostname=relay-ci-mac --accept-routes
          sleep 2
          TSIP=$("$TS" ip -4 | head -1)
          VNCPW=$(openssl rand -hex 4)   # legacy VNC password is max 8 chars
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -restart -agent -privs -all \
            -clientopts -setvnclegacy -vnclegacy yes -setvncpw -vncpw "$VNCPW" || true
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true
          # keep the (virtual) display awake so Screen Sharing shows a real desktop, not black
          sudo pmset -a displaysleep 0 sleep 0 disksleep 0 2>/dev/null || true
          caffeinate -dimsu -t $(( MINUTES * 60 + 120 )) >/dev/null 2>&1 &
          # nudge the display awake right now
          caffeinate -u -t 2 >/dev/null 2>&1 || true
          # enable plain SSH over the tailnet for the driver (pubkey from a repo secret)
          if [ -n "$DRIVER_SSH_PUBKEY" ]; then
            sudo systemsetup -setremotelogin on || true
            sudo dseditgroup -o edit -a "$(whoami)" -t user com.apple.access_ssh 2>/dev/null || true
            chmod go-w "$HOME" 2>/dev/null || true
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            printf '%s\n' "$DRIVER_SSH_PUBKEY" >> ~/.ssh/authorized_keys
            chmod 600 ~/.ssh/authorized_keys
            echo "::notice title=SSH-setup::user=$(whoami) keys=$(wc -l < ~/.ssh/authorized_keys | tr -d ' ') remotelogin=$(sudo systemsetup -getremotelogin 2>/dev/null)"
          fi
          # display self-check (the size tells us if anything is actually on screen)
          screencapture -x /tmp/selfcheck.png 2>/dev/null || true
          echo "::notice title=DISPLAY::console_user=$(stat -f %Su /dev/console 2>/dev/null) screencapture_bytes=$(stat -f%z /tmp/selfcheck.png 2>/dev/null)"
          ./desktop/target/release/relay-desktop --token 4321 --port 47600 &
          echo "::notice title=LIVE TEST READY (macOS)::VNC $TSIP  pw $VNCPW  |  phone → $TSIP:47600 PIN 4321"
          echo "==================================================================="
          echo "  WATCH:  Remmina → VNC → $TSIP   (password: $VNCPW)"
          echo "  DRIVE:  phone Relay → WiFi → connect to  $TSIP : 47600   PIN 4321"
          echo "  NOTE :  first keystroke pops an Accessibility prompt — click Allow"
          echo "          in the VNC window, then it'll type for real."
          echo "  Holding for $MINUTES min…"
          echo "==================================================================="
          sleep $(( MINUTES * 60 ))

      # --------------------------------- Windows ---------------------------------
      - name: Windows — tailnet + RDP + receiver
        if: ${{ inputs.os == 'windows' }}
        shell: pwsh
        env:
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
          MINUTES: ${{ inputs.minutes }}
        run: |
          Invoke-WebRequest "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile ts.msi
          Start-Process msiexec.exe -ArgumentList "/i ts.msi /quiet" -Wait
          $ts = "C:\Program Files\Tailscale\tailscale.exe"
          & $ts up --authkey="$env:TS_AUTHKEY" --hostname=relay-ci-win --unattended
          Start-Sleep 3
          $tsip = (& $ts ip -4 | Select-Object -First 1).Trim()
          # enable Remote Desktop
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          $pw = -join ((48..57)+(65..90)+(97..122) | Get-Random -Count 14 | ForEach-Object {[char]$_})
          net user runneradmin "$pw"
          Start-Process -FilePath ".\desktop\target\release\relay-desktop.exe" -ArgumentList "--token","4321","--port","47600"
          Write-Host "==================================================================="
          Write-Host "  WATCH:  Remmina -> RDP -> $tsip   (user: runneradmin  password: $pw)"
          Write-Host "  DRIVE:  phone Relay -> WiFi -> connect to  $tsip : 47600   PIN 4321"
          Write-Host "  Holding for $env:MINUTES min..."
          Write-Host "==================================================================="
          Start-Sleep -Seconds ([int]$env:MINUTES * 60)

      - name: Leave tailnet
        if: always()
        continue-on-error: true
        run: tailscale logout || true
        shell: bash
