name: android-release

# Tag an app release (e.g. `git tag app-v1.0.0 && git push --tags`) to build a
# signed AAB (for Play) + APK (for sideloading) and attach them to a GitHub Release.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64   - `base64 -w0 keystore/relay.keystore`
#   KEYSTORE_PASSWORD - store password
#   KEY_ALIAS         - key alias
#   KEY_PASSWORD      - key password (== store password for a PKCS12 keystore)
# Optional, for automatic Play Store upload:
#   PLAY_SERVICE_ACCOUNT_JSON - a Google Play service-account key (JSON)

on:
  push:
    tags: ['app-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore signing keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 -d > keystore/relay.keystore
          cat > keystore/keystore.properties <<EOF
          storeFile=relay.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build AAB + APK
        run: ./gradlew bundleRelease assembleRelease --no-daemon

      - name: Collect artifacts
        run: |
          mkdir -p out
          cp app/build/outputs/bundle/release/app-release.aab        out/relay.aab    || true
          cp app/build/outputs/apk/release/app-release.apk           out/relay.apk    || true
          cp app/build/outputs/apk/release/app-release-unsigned.apk  out/relay-unsigned.apk || true
          ls -l out

      - name: Publish GitHub Release (APK)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: false

      - name: Upload to Play Store (internal track)
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.PLAY_JSON != '' }}
        env:
          PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.cadayn.hidinput
          releaseFiles: out/relay.aab
          track: internal
          status: completed
